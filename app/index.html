    <script async>
        // Localize title faster
        const supportedLang = ["EN", "EN-GB", "EN-US", "JA"];
        const appName = {
            "EN": "Omusubi",
            "EN-GB": "Omusubi",
            "EN-US": "Omusubi",
            "JA": "お結び",
        };
        const lang = navigator.languages.map((e) => e.toUpperCase(e)).filter((lang) => {
            return supportedLang.includes(lang);
        })[0];
        document.title = appName[lang] ?? appName["EN"];

        // Remove splash screen
        window.addEventListener('flutter-first-frame', function () {
            document.getElementById("splash").classList.add("splash_remove");
        });

        // Set google map key (Call from flutter)
        let isGMapLoaded = false;
        function setGMapApiKey(key) {
            if (!isGMapLoaded) {
                isGMapLoaded = true;
                const sc = document.createElement("script");
                sc.src = `https://maps.googleapis.com/maps/api/js?key=${key}&v=quarterly`;
                sc.async = true;
                document.head.appendChild(sc);
                console.log("Google map loaded with api key.");
            } else {console.log("google map already loaded. google map loading skipping.")}
        }
    </script>
